<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reset Admin Password | RD Advance Boutique</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

  <section class="admin-login-section">

    <div class="admin-login-container admin-reset-container">

      <div class="admin-left">

        <img src="assets/logo.png" alt="RD Logo" class="admin-logo">

        <h1>RD Advance Boutique</h1>

        <p>Reset Admin Password</p>

      </div>

      <div class="admin-right">

        <div class="admin-form-box">

          <span class="admin-tag">Password Reset</span>

          <h2>Create New Password</h2>

          <p>Enter a strong new password for the admin dashboard. This reset link can be used only once.</p>

          <form id="adminResetPasswordForm">

            <div class="input-group">

              <label>New Password</label>

              <input
                id="newAdminPassword"
                name="newPassword"
                type="password"
                autocomplete="new-password"
                placeholder="Enter new password"
                minlength="8"
                required
              >

            </div>

            <div class="input-group">

              <label>Confirm New Password</label>

              <input
                id="confirmAdminPassword"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                placeholder="Confirm new password"
                minlength="8"
                required
              >

            </div>

            <p id="adminResetMessage" class="admin-login-message" role="alert" aria-live="polite"></p>

            <button type="submit" class="primary-btn admin-btn">Reset Password</button>

            <a class="secondary-btn admin-secondary-link" href="admin-login.html">Back To Login</a>

          </form>

        </div>

      </div>

    </div>

  </section>

  <script>
    const resetForm = document.getElementById("adminResetPasswordForm");
    const resetMessage = document.getElementById("adminResetMessage");
    const resetButton = resetForm.querySelector("button[type='submit']");
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";

    const setMessage = (message, isError = false) => {
      resetMessage.textContent = message;
      resetMessage.classList.toggle("error", isError);
    };

    const disableForm = (message) => {
      Array.from(resetForm.elements).forEach((field) => {
        field.disabled = true;
      });
      setMessage(message, true);
    };

    const validateToken = async () => {
      if (!token) {
        disableForm("Password reset link is missing or invalid.");
        return;
      }

      try {
        const response = await fetch(`/api/v1/admin/auth/password-reset/validate?token=${encodeURIComponent(token)}`, {
          credentials: "same-origin",
          cache: "no-store",
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok || !payload.data?.valid) {
          disableForm("Password reset link is invalid or expired.");
          return;
        }

        setMessage("Reset link verified. Please enter a new password.");
      } catch (error) {
        disableForm("Unable to verify password reset link right now.");
      }
    };

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetButton.disabled = true;
      setMessage("Resetting password...");

      try {
        const response = await fetch("/api/v1/admin/auth/password-reset/complete", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token,
            newPassword: document.getElementById("newAdminPassword").value,
            confirmPassword: document.getElementById("confirmAdminPassword").value,
          }),
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.message || "Unable to reset password.");
        }

        setMessage(payload.message || "Password reset successfully. Redirecting to login...");
        setTimeout(() => {
          window.location.replace("admin-login.html");
        }, 1600);
      } catch (error) {
        setMessage(error.message, true);
        resetButton.disabled = false;
      }
    });

    validateToken();
  </script>

</body>
</html>
