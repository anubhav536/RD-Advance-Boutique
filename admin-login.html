<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Login | RD Advance Boutique</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>





  <!-- ========================= -->
  <!-- LOGIN SECTION -->
  <!-- ========================= -->

  <section class="admin-login-section">

    <div class="admin-login-container">



      <!-- LEFT SIDE -->

      <div class="admin-left">



        <img src="assets/logo.png" alt="RD Logo" class="admin-logo">
        
        



        <h1>

          RD Advance Boutique

        </h1>



        <p>

          Admin Dashboard Access

        </p>



        

      </div>





      <!-- RIGHT SIDE -->

      <div class="admin-right">



        <div class="admin-form-box">

          <span class="admin-tag">

            Secure Login

          </span>



          <h2>

            Welcome Back 👋

          </h2>



          <p>

            Login to manage boutique products,
            orders, gallery and course details.

          </p>





          <!-- LOGIN FORM -->

          <form id="adminLoginForm">



            <!-- EMAIL -->

            <div class="input-group">

              <label>

                Email Address

              </label>



              <input
                id="adminEmail"
                name="email"
                type="email"
                autocomplete="username"
                placeholder="Enter admin email"
                required
              >

            </div>





            <!-- PASSWORD -->

            <div class="input-group">

              <label>

                Password

              </label>



              <input
                id="adminPassword"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Enter password"
                required
              >

            </div>





            <!-- REMEMBER -->

            <div class="remember-box">

              <label>

                <input type="checkbox" disabled>

                Secure session managed by server

              </label>

              <a href="#forgot-password" id="forgotPasswordLink">Forgot password?</a>

            </div>

            <p id="adminLoginMessage" class="admin-login-message" role="alert" aria-live="polite"></p>





            <!-- BUTTON -->

            <button type="submit" class="primary-btn admin-btn">

              Login To Dashboard

            </button>

          </form>

          <!-- FORGOT PASSWORD FORM -->

          <form id="adminForgotPasswordForm" class="admin-forgot-password-form" hidden>

            <div class="input-group">

              <label>

                Admin Email Address

              </label>

              <input
                id="forgotAdminEmail"
                name="email"
                type="email"
                autocomplete="username"
                placeholder="Enter admin email"
                required
              >

            </div>

            <p id="forgotPasswordMessage" class="admin-login-message" role="alert" aria-live="polite"></p>

            <button type="submit" class="primary-btn admin-btn">

              Send Reset Link

            </button>

            <button type="button" id="backToLoginButton" class="secondary-btn admin-secondary-btn">

              Back To Login

            </button>

          </form>





          <!-- DASHBOARD INFO -->

          <div class="admin-info">



            <div class="admin-info-card">

              <h3>

                Manage Products

              </h3>

            </div>





            <div class="admin-info-card">

              <h3>

                Update Gallery

              </h3>

            </div>





            <div class="admin-info-card">

              <h3>

                Manage Courses

              </h3>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>





  <!-- ========================= -->
  <!-- LOGIN SCRIPT -->
  <!-- ========================= -->

  <script>

    const loginForm = document.getElementById("adminLoginForm");
    const loginMessage = document.getElementById("adminLoginMessage");
    const loginButton = loginForm.querySelector("button[type='submit']");
    const forgotPasswordLink = document.getElementById("forgotPasswordLink");
    const forgotPasswordForm = document.getElementById("adminForgotPasswordForm");
    const forgotPasswordMessage = document.getElementById("forgotPasswordMessage");
    const forgotPasswordButton = forgotPasswordForm.querySelector("button[type='submit']");
    const backToLoginButton = document.getElementById("backToLoginButton");
    const params = new URLSearchParams(window.location.search);
    const requestedNextPage = params.get("next") || "admin-dashboard.html";
    const nextPage = requestedNextPage.startsWith("/") && !requestedNextPage.startsWith("//")
      ? requestedNextPage
      : "admin-dashboard.html";

    const setMessage = (message, isError = false, target = loginMessage) => {
      target.textContent = message;
      target.classList.toggle("error", isError);
    };

    const showForgotPassword = () => {
      forgotPasswordForm.hidden = false;
      loginForm.hidden = true;
      document.getElementById("forgotAdminEmail").value = document.getElementById("adminEmail").value;
      setMessage("Enter your admin email to receive a reset link.", false, forgotPasswordMessage);
    };

    const showLogin = () => {
      forgotPasswordForm.hidden = true;
      loginForm.hidden = false;
      setMessage("", false, forgotPasswordMessage);
    };

    forgotPasswordLink.addEventListener("click", (event) => {
      event.preventDefault();
      showForgotPassword();
    });

    backToLoginButton.addEventListener("click", showLogin);

    forgotPasswordForm.addEventListener("submit", async function(e){
      e.preventDefault();
      forgotPasswordButton.disabled = true;
      setMessage("Sending reset link...", false, forgotPasswordMessage);

      try {
        const response = await fetch("/api/v1/admin/auth/password-reset/request", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("forgotAdminEmail").value,
          }),
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.message || "Unable to send reset link.");
        }

        const preview = payload.data?.previewLink ? ` Development preview: ${payload.data.previewLink}` : "";
        setMessage(`${payload.message}${preview}`, false, forgotPasswordMessage);
      } catch (error) {
        setMessage(error.message, true, forgotPasswordMessage);
      } finally {
        forgotPasswordButton.disabled = false;
      }
    });

    loginForm.addEventListener("submit", async function(e){
      e.preventDefault();
      loginButton.disabled = true;
      setMessage("Checking credentials...");

      try {
        const response = await fetch("/api/v1/admin/auth/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("adminEmail").value,
            password: document.getElementById("adminPassword").value,
          }),
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.message || "Invalid admin credentials.");
        }

        setMessage("Login successful. Redirecting...");
        window.location.replace(nextPage);
      } catch (error) {
        setMessage(error.message, true);
        loginButton.disabled = false;
      }
    });

  </script>

</body>
</html>
